# Phase 3B: Tabular GAN/VAE pilot configuration.

version: "0.1"
pilot_date: "2026-06-28"
prerequisite: phase_3a_complete

model:
  primary: ctgan
  fallback: tvae
  epochs: 150
  batch_size: 8
  verbose: false

generation:
  target_export: 50
  candidate_pool: 400
  random_seed: 42

# Integer clamp ranges for post-processing sampled values.
column_ranges:
  video_category_enc: [0, 1]
  activity_group_enc: [0, 13]
  workflow_stage_enc: [0, 3]
  movement_pattern_enc: [0, 4]
  operating_surface_enc: [0, 3]
  congestion_level_enc: [1, 3]
  reinforcement_complexity_enc: [0, 3]
  access_condition_enc: [1, 3]
  safety_condition_enc: [1, 3]
  evidence_level_enc: [1, 2]
  coding_confidence_enc: [2, 3]
  manufacturer_name_enc: [0, 2]
  comparison_robot_enc: [0, 1]
  labour_count_visible: [0, 12]
  robot_operator_count: [0, 2]

output:
  gan_dataset: synthetic_scenario_dataset_gan.csv
  combined_dataset: synthetic_scenario_dataset_all.csv
  generation_method_ctgan: tabular_gan
  generation_method_tvae: tabular_vae
  synthetic_provenance: tabular_generative_pilot

research_limits:
  - small_sample_pilot_n14_training
  - post_filtered_by_construction_constraints
  - not_field_validated
  - no_productivity_fields
