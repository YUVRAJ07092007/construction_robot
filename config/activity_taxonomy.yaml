# Standardized activity labels for robot and Mivan video coding.
# Separate fresh-concrete from post-cast activities.

activity_groups:
  rebar_work:
    description: Pre-pour reinforcement fixing, tying, placement
    workflow_stage: pre-pour
  formwork_work:
    description: Aluminium/Mivan panel erection, alignment, stripping prep
    workflow_stage: pre-pour
  mep_conduit_work:
    description: Electrical/conduit installation before pour
    workflow_stage: pre-pour
  concrete_pouring:
    description: Slab or wall concrete placement and vibration
    workflow_stage: pour
  fresh_concrete_leveling:
    description: Leveling/screeding on wet or freshly placed concrete
    workflow_stage: pour
    surface: wet_concrete
  fresh_concrete_finishing:
    description: Troweling/smoothing on wet or partially set concrete
    workflow_stage: pour
    surface: wet_concrete
  post_cast_floor_grinding:
    description: Grinding on hardened floor or wall/ceiling surfaces
    workflow_stage: post-cast
    surface: hardened_concrete
  post_cast_surface_preparation:
    description: Putty prep, patching, substrate preparation after cast
    workflow_stage: post-cast
  post_cast_coating:
    description: Paint, coating, or sealant on hardened surfaces
    workflow_stage: post-cast
    surface: hardened_concrete
  layout_marking:
    description: Survey, layout, or measurement robot activity
    workflow_stage: pre-pour
  inspection:
    description: Quality or progress inspection tasks
    workflow_stage: any
  robot_transport_setup:
    description: Lifting, positioning, or site logistics for robots
    workflow_stage: any
  other:
    description: Recognized but uncategorized activity
  unknown:
    description: Activity not confidently identifiable

legacy_label_map:
  # Robot / cleaned unified labels
  concrete_leveling: fresh_concrete_leveling
  concrete_finishing: post_cast_coating
  coating_finishing: post_cast_coating
  floor_grinding: post_cast_floor_grinding
  formwork: formwork_work
  formwork_process: formwork_work
  formwork_components: formwork_work
  formwork_erection: formwork_work
  wall_panel_erection: formwork_work
  post_cast_finishing: post_cast_surface_preparation
  # Mivan observation shorthand
  rebar: rebar_work
  MEP: mep_conduit_work
  mep: mep_conduit_work
  concrete_pour: concrete_pouring
  finishing: post_cast_surface_preparation
  stripping: formwork_work
  # Cleaned-dataset legacy labels
  slab_reinforcement: rebar_work
  mep_slab_work: mep_conduit_work
  deshuttering: formwork_work
  # Segment-level granular Mivan labels
  beam_reinforcement: rebar_work
  bracket_installation: formwork_work
  building_level_check: inspection
  concrete_pour_and_vibration: concrete_pouring
  electrical_mep: mep_conduit_work
  external_wall_erection: formwork_work
  grid_line_and_thesi: layout_marking
  grid_line_drawing_reading: layout_marking
  ground_survey: layout_marking
  kicker_level_deviation: inspection
  post_concrete_activity: other
  post_concrete_survey: inspection
  setting_out_mivan: layout_marking
  shuttering_quality_check: inspection
  slab_supporting_and_quality_check: formwork_work
  vertical_rebar_and_wall_prep: rebar_work
  vertical_rebar_fixing: rebar_work
  wall_tie_hole_filling: post_cast_surface_preparation

correction_principle: >
  Do not label indoor coating or hardened-surface finishing as fresh concrete finishing.
  When uncertain, use unknown or other rather than guessing.
